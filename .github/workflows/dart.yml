name: Flutter CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Validate agent docs contract
        run: dart run tooling/validate_agent_docs.dart

      - name: Validate localization contract
        run: dart run tooling/validate_localization.dart

      - name: Validate workspace hygiene contract
        run: dart run tooling/validate_workspace_hygiene.dart

      - name: Localization regression suite
        run: flutter test -j 1 -r expanded test/l10n/app_strings_test.dart

      - name: Workspace hygiene regression suite
        run: flutter test -j 1 -r expanded test/tooling/validate_workspace_hygiene_test.dart

      - name: Reader regression suite
        run: flutter test -j 1 -r expanded test/screens/reader_screen_test.dart

      - name: Navigation shell regression suite
        run: flutter test -j 1 -r expanded test/app/navigation_shell_menu_test.dart

      - name: Preferences regression suite
        run: flutter test -j 1 -r expanded test/app/app_preferences_test.dart
